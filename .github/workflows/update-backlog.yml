name: update-backlog
on:
  schedule:
    - cron: "17 3 * * *"   # nightly 03:17 UTC
  workflow_dispatch:
    inputs:
      chains:
        description: "space-separated chain keys (empty = all)"
        required: false
        default: ""
permissions:
  contents: write
concurrency: backlog
jobs:
  index:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/cache@v4
        with:
          path: cache
          key: indexer-cache-${{ github.run_id }}
          restore-keys: |
            indexer-cache-
      - run: npm install js-sha3
      - run: node indexer.mjs ${{ inputs.chains }}
      - name: commit snapshot
        run: |
          git config user.name "runway-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add unclaimed.json users-*.json users-index.json
          git diff --cached --quiet || git commit -m "backlog snapshot $(date -u +%FT%TZ)"
          git push
